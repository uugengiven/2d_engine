<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex Color Test</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="engine" style="width: 960px; height: 720px;"></canvas>
    <script type="module">
        import { Engine }  from './engine/engine.js';
        import { Texture } from './engine/texture.js';
        import { Sprite }  from './engine/sprite.js';
        import { Light }   from './engine/light.js';

        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = url;
            });
        }

        async function main() {
            const canvas = document.getElementById('engine');
            const engine = await Engine.init(canvas, 160, 120);

            const img = await loadImage('white.png');
            const normal = await loadImage('labyrinth_normal.png');
            const texture = await Texture.create(engine.device, img, { normalMap: normal });

            // Fill the screen with tiles so we can see the light fall off across them
            const tileSize = 32;
            const tiles = [];
            for (let y = 0; y < engine.height; y += tileSize) {
                for (let x = 0; x < engine.width; x += tileSize) {
                    tiles.push(new Sprite(texture, { x, y, width: tileSize, height: tileSize }));
                }
            }

            // Animated point light that orbits the center of the screen
            const pointLight = Light.point(
                { x: 80, y: 60 },
                { r: 255, g: 50, b: 50 },
                1.0,
                120,
                2.0,
                50,
                12
            );
            const pointLight2 = Light.point(
                { x: 80, y: 60 },
                { r: 10, g: 10, b: 255 },
                1.0,
                120,
                2.0,
                50,
                0
            );

            const ambient = Light.ambient({ r: 30, g: 30, b: 50 }, 1.0);

            let angle = 0;

            function tick() {
                angle += 0.01;
                pointLight.position.x = 80 + Math.cos(angle) * 80;
                pointLight.position.y = 60 + Math.sin(angle) * 60;
                pointLight2.position.x = 80 + Math.cos(angle * -1) * 80;
                pointLight2.position.y = 60 + Math.sin(angle * -1) * 60;

                engine.backbuffer.clear(0, 0, 0);
                engine.backbuffer.layer([ambient, pointLight, pointLight2]);
                for (const tile of tiles) engine.backbuffer.draw(tile);
                engine.buffer_flip();

                requestAnimationFrame(tick);
            }

            requestAnimationFrame(tick);
        }

        main().catch(console.error);
    </script>
</body>
</html>
